<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LinkFPGA</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root { color-scheme: dark; }
body {
  font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  background: #0b0e14; color: #d0d6e1;
  margin: 0; padding: 1.5rem;
}
h1 { margin: 0 0 0.5rem 0; color: #ffae57; font-weight: 600; font-size: 1.4rem; }
h2 { color: #7fd1ff; font-size: 1rem; margin: 1.6rem 0 0.4rem 0;
     text-transform: uppercase; letter-spacing: 0.06em; }
.status { display: grid; grid-template-columns: max-content 1fr; gap: 0.4rem 1.2rem; }
.status div:nth-child(odd) { color: #6b7993; }
.peers { width: 100%; border-collapse: collapse; }
.peers th, .peers td {
  padding: 0.35rem 0.6rem; border-bottom: 1px solid #1c2230;
  text-align: left; font-size: 0.92rem;
}
.peers th { color: #6b7993; font-weight: normal; }
.controls { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
input, button {
  background: #161c27; color: #d0d6e1; border: 1px solid #2a3346;
  padding: 0.4rem 0.7rem; font: inherit; border-radius: 3px;
}
button { cursor: pointer; }
button:hover { background: #1f2839; }
.led { display: inline-block; width: 0.7rem; height: 0.7rem; border-radius: 50%;
       background: #2a3346; vertical-align: middle; margin-right: 0.3rem; }
.led.on  { background: #5fdc7e; box-shadow: 0 0 6px #5fdc7e; }
.led.warn{ background: #ffae57; box-shadow: 0 0 6px #ffae57; }
small { color: #6b7993; }
</style>
</head>
<body>
<h1>LinkFPGA — Ableton Link in Hardware</h1>
<small id="ident">loading…</small>

<h2>Status</h2>
<div class="status">
  <div>session</div>      <div id="session">—</div>
  <div>tempo</div>        <div id="tempo">—</div>
  <div>beat</div>         <div id="beat">—</div>
  <div>play</div>         <div id="play">—</div>
  <div>peers</div>        <div id="npeers">0</div>
  <div>sync</div>         <div><span id="syncled" class="led"></span><span id="synctxt">—</span></div>
</div>

<h2>Peers</h2>
<table class="peers" id="peerstbl">
  <thead><tr><th>NodeId</th><th>Session</th><th>Tempo</th><th>Endpoint</th></tr></thead>
  <tbody></tbody>
</table>

<h2>Local controls</h2>
<div class="controls">
  <label>tempo (BPM) <input id="tempoIn" type="number" min="20" max="999" step="0.1" value="120"></label>
  <button onclick="setTempo()">apply</button>
  <button onclick="play(true)">play</button>
  <button onclick="play(false)">stop</button>
</div>

<h2>TDM ports</h2>
<div id="tdminfo">—</div>

<h2>Authentication</h2>
<div class="controls">
  <label>user <input id="authU" placeholder="(none)"></label>
  <label>pass <input id="authP" type="password"></label>
  <button onclick="setAuth()">save</button>
</div>

<script>
const $ = id => document.getElementById(id);

async function refresh() {
  try {
    const r = await fetch('/api/status');
    const j = await r.json();
    $('ident'  ).textContent = 'NodeId ' + j.node_id;
    $('session').textContent = j.session_id;
    $('tempo'  ).textContent = j.tempo_bpm.toFixed(2) + ' BPM';
    $('beat'   ).textContent = j.beats.toFixed(3);
    $('play'   ).textContent = j.playing ? 'PLAYING' : 'stopped';
    $('npeers' ).textContent = j.peers.length;
    const synced = j.synced ? 'on' : '';
    $('syncled').className = 'led ' + synced;
    $('synctxt').textContent = j.synced ? 'locked' : 'free';
    const tb = $('peerstbl').tBodies[0];
    tb.innerHTML = '';
    for (const p of j.peers) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${p.node_id}</td><td>${p.session_id}</td>` +
                     `<td>${p.tempo_bpm.toFixed(2)}</td><td>${p.endpoint}</td>`;
      tb.appendChild(tr);
    }
    $('tdminfo').textContent =
      `${j.tdm.physical} physical + ${j.tdm.virtual} virtual TDM16 ports, ` +
      `${j.tdm.channels_per_port} ch each @ ${j.tdm.fs_hz} Hz`;
  } catch(e) { /* offline */ }
}

async function setTempo() {
  await fetch('/api/tempo', { method: 'POST', body: $('tempoIn').value });
  refresh();
}
async function play(p) {
  await fetch('/api/play',  { method: 'POST', body: p ? '1' : '0' });
  refresh();
}
async function setAuth() {
  await fetch('/api/auth',  { method: 'POST',
    body: $('authU').value + ':' + $('authP').value });
}

refresh();
setInterval(refresh, 1000);
</script>
</body>
</html>
